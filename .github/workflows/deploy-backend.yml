name: Deploy FastAPI Backend

# This tells GitHub to only run the pipeline when code is pushed to the main branch
on:
  push:
    branches:
      - master
    paths:
      - 'backend/**' # Only triggers if files in the backend folder change
      - '.github/workflows/deploy-backend.yml'
      - 'requirements.txt'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' # Use stable Python 3.11

      - name: Install Dependencies and Create Zip
        run: |
          mkdir package
          pip install -r requirements.txt -t package/
          cp -r backend package/
          cp foods_dataset.json package/ || true
          cp meal_plans.json package/ || true
          cd package
          zip -r9 ../deployment_package.zip .

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1 # Change this if your Lambda is in a different region

      - name: Upload Zip to S3 Staging
        run: |
          aws s3 cp ../deployment_package.zip s3://YOUR_BUCKET_NAME/deployment_package.zip

      - name: Tell Lambda to Pull from S3
        run: |
          aws lambda update-function-code \
            --function-name NutriPlan-Backend \
            --s3-bucket YOUR_BUCKET_NAME \
            --s3-key deployment_package.zip