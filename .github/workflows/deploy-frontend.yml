name: Deploy Streamlit Frontend

on:
  push:
    branches:
      - master
    paths:
      - 'frontend/**' # Only triggers if files in the frontend folder change

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH into EC2 and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Navigate to your project folder
            cd /home/ec2-user/NutriPlan
            
            # 2. Pull the latest code from GitHub
            git pull origin master
            
            # 3. Navigate into the frontend folder
            cd frontend
            
            # 4. Install any new libraries you might have added
            ./env/bin/pip install -r requirements.txt
            
            # 5. Restart the permanent background service
            sudo systemctl restart streamlit